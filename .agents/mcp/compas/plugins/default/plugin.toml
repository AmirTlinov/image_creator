tools = []

[plugin]
id = "default"
description = "Generated by compas.init (language packs + minimal gate wiring)"
tool_import_globs = ["tools/custom/**/tool.toml"]

[tool_policy]
mode = "allowlist"
allow_commands = ["uv"]

[gate]
ci_fast = ["python-ruff", "python-mypy", "python-pytest"]
ci = ["python-ruff", "python-mypy", "python-pytest"]
flagship = ["python-ruff", "python-mypy", "python-pytest"]

[checks]
env_registry = []
boundary = []
surface = []
reuse_first = []
arch_layers = []
dead_code = []
orphan_api = []
complexity_budget = []
contract_break = []

[[checks.loc]]
id = "loc-main"
max_loc = 600
include_globs = ["src/**/*"]
exclude_globs = [
    "**/target/**",
    "**/node_modules/**",
    ".git/**",
]
baseline_path = ".agents/mcp/compas/baselines/loc.json"

[[checks.duplicates]]
id = "duplicates-main"
include_globs = ["src/**/*"]
exclude_globs = [
    "**/target/**",
    "**/node_modules/**",
    ".git/**",
]
max_file_bytes = 262144
allowlist_globs = []
baseline_path = ".agents/mcp/compas/baselines/duplicates.json"

[[checks.supply_chain]]
id = "supply-chain-main"

[[checks.tool_budget]]
id = "tool-budget-main"
max_tools_total = 64
max_tools_per_plugin = 32
max_gate_tools_per_kind = 16
max_checks_total = 24
